# ============================================================================
# SENTINEL CONFIGURATION
# ============================================================================
# Edit this file to match YOUR machine.
# Lines starting with # are comments. Blank lines are ignored.
# ============================================================================

# ----------------------------------------------------------------------------
# GENERAL
# ----------------------------------------------------------------------------

# Where sentinel stores its data (logs, baselines, alerts)
SENTINEL_DIR="$HOME/.sentinel"

# Log file path
LOG_FILE="$SENTINEL_DIR/sentinel.log"

# Max log file size in bytes before rotation (5MB default)
MAX_LOG_SIZE=5242880

# Alert method: "terminal" (print), "log" (file only), "notify" (macOS notification)
# Comma-separated for multiple: "terminal,log,notify"
ALERT_METHOD="terminal,log"

# ----------------------------------------------------------------------------
# PORT WHITELIST
# ----------------------------------------------------------------------------
# Ports you EXPECT to be listening. Everything else triggers an alert.
# Format: PORT/PROTOCOL  DESCRIPTION
# Use * for any address, or specify 127.0.0.1 for localhost-only
#
# Common defaults included. Remove what you don't use. Add what you do.

WHITELIST_PORTS=(
    # SSH (remove if you don't use it)
    # "22"

    # HTTP/HTTPS dev servers (localhost only is safe)
    # "80"
    # "443"
    # "8080"
    # "8443"
    # "3000"

    # PostgreSQL
    # "5432"

    # MySQL
    # "3306"

    # Redis
    # "6379"

    # Ollama (AI inference)
    "11434"

    # Apple services (rapportd, AirDrop, etc.)
    # Comment these out if you disabled AirDrop
    "49152"
    "49153"
    "49154"
    "49155"
)

# ----------------------------------------------------------------------------
# SERVICE WATCHDOG (selfheal)
# ----------------------------------------------------------------------------
# Format: NAME|CHECK_COMMAND|RESTART_COMMAND|INTERVAL_SECONDS
#
# CHECK_COMMAND should exit 0 if healthy, non-zero if not.
# RESTART_COMMAND runs when check fails.
# INTERVAL is seconds between checks.
#
# Examples:
# SERVICES=(
#     "nginx|curl -sf http://localhost:80 > /dev/null|sudo nginx -s reload|60"
#     "postgres|pg_isready -q|brew services restart postgresql|120"
#     "ollama|curl -sf http://localhost:11434 > /dev/null|ollama serve &|60"
# )

SERVICES=(
    # Add your services here
    # "myapp|curl -sf http://localhost:8080 > /dev/null|/path/to/restart.sh|60"
)

# ----------------------------------------------------------------------------
# CONNECTION MONITOR
# ----------------------------------------------------------------------------

# How often to snapshot connections (seconds)
CONN_INTERVAL=300

# Ports commonly used by malware/miners. Connections to these trigger alerts.
BAD_PORTS=(
    "4444"    # Metasploit default
    "5555"    # Android debug / backdoors
    "6666"    # IRC backdoors
    "6667"    # IRC
    "6697"    # IRC SSL
    "8333"    # Bitcoin
    "9050"    # Tor SOCKS
    "9051"    # Tor control
    "9150"    # Tor Browser
    "14444"   # Crypto mining (XMR)
    "14433"   # Crypto mining
    "45700"   # Crypto mining
    "3333"    # Crypto mining pool
    "5556"    # Crypto mining
    "7777"    # Crypto mining
    "8888"    # Common backdoor
    "31337"   # Elite backdoor
)

# Processes whose connections we don't flag (reduces noise)
CONN_TRUSTED_PROCESSES=(
    "Google Chrome"
    "Safari"
    "Firefox"
    "curl"
    "git"
    "ssh"
    "Slack"
    "Discord"
    "Spotify"
    "Code"          # VS Code
    "claude"
    "CloudflareDNS"
    "mDNSResponder"
    "identityservicesd"
    "apsd"          # Apple Push
    "nsurlsessiond"
    "com.apple"
)

# ----------------------------------------------------------------------------
# TRIPWIRE (Honeypot Decoys)
# ----------------------------------------------------------------------------

# Where to place decoy files. Each path gets a set of fake sensitive files.
# These should be places an intruder would look.
DECOY_LOCATIONS=(
    "$HOME/.config/backup"
    "$HOME/.ssh_backup"
    "$HOME/Documents/.vault"
)

# How often to check decoys if fswatch is unavailable (seconds)
DECOY_POLL_INTERVAL=30

# ----------------------------------------------------------------------------
# AUDIT SETTINGS
# ----------------------------------------------------------------------------

# Directories to scan for stale sensitive files
AUDIT_SCAN_DIRS=(
    "$HOME/Downloads"
    "$HOME/Desktop"
    "/tmp"
)

# File patterns that shouldn't live in the above directories
AUDIT_SENSITIVE_PATTERNS=(
    "*.pem"
    "*.key"
    "*.p12"
    "*.pfx"
    "*.env"
    "*.env.*"
    "id_rsa*"
    "id_ed25519*"
    "*.keystore"
    "*.jks"
)

# Directories to check for .env files with secrets
AUDIT_CODE_DIRS=(
    "$HOME/Projects"
    "$HOME/Developer"
    "$HOME/code"
    "$HOME/src"
)

# Max age in days for sensitive files in Downloads before warning
AUDIT_STALE_DAYS=7
